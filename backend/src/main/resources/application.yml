spring:
  application:
    name: docpanther-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/docpanther_control}
    username: ${DB_USERNAME:docpanther}
    password: ${DB_PASSWORD:docpanther}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          min-idle: 5

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-disabled}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-disabled}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/api/auth/google/callback"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
  forward-headers-strategy: framework

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-jwt-secret-must-be-32chars!}
    access-token-expiry-ms: 900000      # 15 minutes
    refresh-token-expiry-ms: 604800000  # 7 days

  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:3000}
      - https://app.docpanther.com
      - https://docpanther.com

  s3:
    bucket-prefix: docpanther
    presigned-url-expiry-minutes: 15

  frontend-url: ${FRONTEND_URL:http://localhost:3000}

aws:
  region: ${AWS_REGION:ap-south-1}

logging:
  level:
    com.docpanther: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO

